---
# --------------------------------------------
# CloudWatch Agent のインストール
# --------------------------------------------
- name: Download CloudWatch Agent
  ansible.builtin.get_url:
    url: https://amazoncloudwatch-agent.s3.amazonaws.com/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm
    dest: /tmp/amazon-cloudwatch-agent.rpm
    mode: "0644"

- name: Install CloudWatch Agent
  ansible.builtin.dnf:
    name: /tmp/amazon-cloudwatch-agent.rpm
    state: present
    disable_gpg_check: true

# --------------------------------------------
# CloudWatch Agent 設定
# --------------------------------------------
- name: Create CloudWatch Agent config directory
  ansible.builtin.file:
    path: /opt/aws/amazon-cloudwatch-agent/etc
    state: directory
    mode: "0755"

- name: Deploy CloudWatch Agent config
  ansible.builtin.template:
    src: cloudwatch-agent-config.json.j2
    dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    mode: "0644"
  notify: Restart CloudWatch Agent

# --------------------------------------------
# CloudWatch Agent の起動
# --------------------------------------------
- name: Start CloudWatch Agent
  ansible.builtin.command:
    cmd: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c
      file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
  changed_when: true

- name: Enable CloudWatch Agent service
  ansible.builtin.systemd:
    name: amazon-cloudwatch-agent
    enabled: true
    state: started
